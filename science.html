<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pankaj Kumar - Header with Search</title>
  <style>
    :root {
      --primary-color: #3f51b5;
      --secondary-color: #ff9800;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f9f9ff, #ffe9f3);
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 15px 5%;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      animation: slideDown 1s ease;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.8em;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
    }

    nav ul li {
      margin-left: 25px;
    }

    nav ul li a {
      text-decoration: none;
      color: white;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    nav ul li a:hover {
      color: #ffe97f;
      text-shadow: 0px 0px 6px #fff;
    }

    /* 🔍 Search Bar Style */
    .search-box {
      margin-left: 20px;
      position: relative;
    }

    .search-box input {
      padding: 6px 30px 6px 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 0.95em;
      transition: 0.3s;
    }

    .search-box input:focus {
      box-shadow: 0 0 8px #fff;
    }

    .search-box::after {
      content: "🔍";
      position: absolute;
      right: 10px;
      top: 4px;
      font-size: 1.1em;
      pointer-events: none;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

    @media(max-width: 768px) {
      nav {
        flex-direction: column;
        text-align: center;
      }
      nav ul {
        margin-top: 10px;
        flex-direction: column;
      }
      nav ul li {
        margin: 10px 0;
      }
      .search-box {
        margin: 10px 0;
      }
    }
  </style>
</head>
<body>

  <!-- हेडर + सर्च बार -->
  <header>
    <nav>
      <div class="logo">🌟 Pankaj Kumar 🌟</div>
      
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search here...">
      </div>
      
      <ul id="menuList">
        <li><a href="index.html">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">YouTube</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <script>
    // 🔍 Live Search Function
    const searchInput = document.getElementById('searchInput');
    const menuList = document.getElementById('menuList');
    const items = menuList.getElementsByTagName('li');

    searchInput.addEventListener('keyup', function() {
      const filter = searchInput.value.toLowerCase();
      for (let i = 0; i < items.length; i++) {
        let text = items[i].textContent.toLowerCase();
        if (text.includes(filter)) {
          items[i].style.display = "";
        } else {
          items[i].style.display = "none";
        }
      }
    });
  </script>

</style>

<body><!-- ===== SPLASH ===== --><div id="splash">

 window.open("https://drive.google.com/drive/folders/1DuC15qv6YUK8IJpPqiF0jXI1Sd7C3nCT","_blank");

<!-- Multi-Color Neon CSS -->
<style>
  .neon-btn {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    font-size: 1.1em;
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 6px #142850;
    transition: all 0.25s ease-in-out;
    position: relative;
    overflow: hidden;
  }

  /* Hover 3D + Glow effect */
  .neon-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 25px #00eaff, 0 0 40px #8a2be2, 0 8px 20px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, #4a00e0, #8e2de2);
  }

  /* Press effect */
  .neon-btn:active {
    transform: translateY(2px);
    box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
  }

  /* Glowing Border Animation */
  .neon-btn::after {
    content: "";
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    border-radius: 15px;
    background: linear-gradient(45deg, 
      #00eaff, #ff00ff, #00ff6a, #ffcc00, #00eaff);
    z-index: -1;
    filter: blur(12px);
    opacity: 0;
    transition: opacity 0.4s ease-in-out;
    animation: neon-pulse 3s infinite linear;
  }

  .neon-btn:hover::after {
    opacity: 1;
  }

  /* Smooth Glow Animation */
  @keyframes neon-pulse {
    0% { background-position: 0% 50%; opacity: 0.5; }
    50% { background-position: 100% 50%; opacity: 1; }
    100% { background-position: 0% 50%; opacity: 0.5; }
  }

  .small-btn {
    font-size: 0.95em;
    padding: 10px 22px;
  }
</style>
