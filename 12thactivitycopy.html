<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pankaj Kumar - 12th Activity</title>

  <style>
    /* ================= GLOBAL STYLES ================= */
    :root {
      --primary-color: #3f51b5;
      --secondary-color: #ff9800;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0f2f5, #e0eafc);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column; /* Header upar, content neeche */
    }

    /* ================= HEADER CSS ================= */
    header {
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      color: #fff;
      padding: 15px 5%;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      animation: slideDown 1s ease;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.5em;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      text-decoration: none;
      color: white;
      font-weight: 500;
      transition: .3s;
    }

    nav ul li a:hover {
      color: #ffe97f;
      text-shadow: 0 0 6px #fff;
    }

    /* Search Box */
    .search-box {
      margin-left: 20px;
      position: relative;
    }
    .search-box input {
      padding: 6px 30px 6px 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: .95em;
    }
    .search-box::after {
      content: "🔍";
      position: absolute;
      right: 10px;
      top: 4px;
      pointer-events: none;
    }

    /* Red Blink Highlight */
    .search-blink-red {
      outline: 3px solid red !important;
      animation: redBlink 1s infinite;
    }

    @keyframes redBlink {
      0% { box-shadow: 0 0 6px red; }
      50% { box-shadow: 0 0 22px red; }
      100% { box-shadow: 0 0 6px red; }
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

    /* ================= ACTIVITY BOX CSS ================= */
    
    /* Main wrapper to center the box */
    main {
      flex: 1; /* Bachi hui jagah lega */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background-color: #ffffff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      width: 320px;
      text-align: center;
      transition: transform 0.3s;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 35px;
      font-weight: 800;
      text-transform: uppercase;
      background: -webkit-linear-gradient(45deg, #09009f, #00ff95);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    ul.activity-list li {
      margin: 20px 0;
      list-style: none;
    }
    
    /* Button Styles */
    a.activity-btn {
      position: relative;
      text-decoration: none;
      color: #ffffff;
      padding: 18px 20px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      display: block;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      letter-spacing: 0.5px;
    }

    /* Colors */
    .physics { background: linear-gradient(45deg, #2193b0, #6dd5ed); }
    .physics:hover { box-shadow: 0 8px 20px rgba(33, 147, 176, 0.4); }

    .biology { background: linear-gradient(45deg, #11998e, #38ef7d); }
    .biology:hover { box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4); }

    .chemistry { background: linear-gradient(45deg, #FF416C, #FF4B2B); }
    .chemistry:hover { box-shadow: 0 8px 20px rgba(255, 65, 108, 0.4); }

    /* Button Animations */
    a.activity-btn:hover { transform: translateY(-4px); }
    a.activity-btn:active { transform: scale(0.95) translateY(0); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    /* Ripple Effect */
    span.ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple 0.6s linear;
      background-color: rgba(255, 255, 255, 0.5);
    }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    /* Media Query for Mobile */
    @media(max-width: 768px) {
      nav { flex-direction: column; text-align: center; }
      nav ul { margin-top: 10px; flex-direction: column; padding: 0; }
      nav ul li { margin: 10px 0; }
      .search-box { margin: 10px 0; }
    }
  </style>
</head>

<body>

  <header>
    <nav>
      <div class="logo">🌟 Pankaj Kumar 🌟</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search here...">
      </div>
      <ul id="menuList">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="#">YouTube</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container">
      <h1>12th Activity Copy</h1>
      <ul class="activity-list">
        <li><a href="https://drive.google.com/drive/folders/1qMxPjw7gPYMS-CZ98Rxlwd4pc2QLJYrG" class="activity-btn ripple-btn physics">Physics</a></li>
        <li><a href="https://drive.google.com/drive/folders/1APp_9M8Xuz86SzqBGyIeykD00wPANK0Y" class="activity-btn ripple-btn biology">Biology</a></li>
        <li><a href="https://drive.google.com/drive/folders/1HqaXjPRTFytW8cVZ4alc8_1BwxPOMzVC" class="activity-btn ripple-btn chemistry">Chemistry</a></li>
      </ul>
    </div>
  </main>

  <script>
    /* 1. RIPPLE EFFECT LOGIC */
    const buttons = document.querySelectorAll('.ripple-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', function (e) {
        let x = e.clientX - e.target.getBoundingClientRect().left;
        let y = e.clientY - e.target.getBoundingClientRect().top;
        let ripples = document.createElement('span');
        ripples.style.left = x + 'px';
        ripples.style.top = y + 'px';
        ripples.classList.add('ripple');
        this.appendChild(ripples);
        setTimeout(() => ripples.remove(), 600);
      });
    });

    /* 2. GLOBAL VIBRATION */
    document.addEventListener("click", function () {
      if (navigator.vibrate) navigator.vibrate(40);
    }, true);

    /* 3. SEARCH & HIGHLIGHT LOGIC */
    (function(){
      const search = document.getElementById("searchInput");
      const menuItems = document.querySelectorAll("#menuList li");
      const contentBlocks = document.querySelectorAll(".container, h1, a.activity-btn"); 
      // Note: Search ab sirf menu aur activity buttons par kaam karega

      let last = null;

      search.addEventListener("input", function(){
        const q = this.value.toLowerCase().trim();

        /* Menu Filter */
        menuItems.forEach(li=>{
          li.style.display = li.innerText.toLowerCase().includes(q) ? "" : "none";
        });

        /* Remove Old Highlight */
        if(last){
          last.classList.remove("search-blink-red");
          last = null;
        }

        if(!q) return;

        /* Activity Button Search Highlight */
        for(const el of contentBlocks){
          if(el.innerText && el.innerText.toLowerCase().includes(q)){
            el.classList.add("search-blink-red");
            el.scrollIntoView({behavior:"smooth",block:"center"});
            last = el;
            break;
          }
        }
      });
    })();
  </script>

</body>
</html>
