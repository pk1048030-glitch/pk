<script>
/* 🧩 Puzzle */
function checkPuzzle(){
  const ans = document.getElementById("puzzleInput").value.trim().toUpperCase();
  if(ans === "AKASH"){
    puzzleBox.style.display="none";
    passwordBox.style.display="block";
  } else {
    puzzleError.innerText="❌ Wrong Answer";
    navigator.vibrate?.(300);
  }
}

/* 👁️ Show / Hide Password */
let hideTimer;
function togglePassword(){
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";

  clearTimeout(hideTimer);
  if(input.type === "text"){
    hideTimer = setTimeout(()=>{
      input.type = "password";
    },5000);
  }
}

/* 🔐 Strength Checker */
function checkStrength(){
  const val = document.getElementById("password").value;
  const strength = document.getElementById("strength");

  if(val.length < 6){
    strength.innerText="Strength: Weak";
    strength.style.color="red";
  } else if(val.length < 10){
    strength.innerText="Strength: Medium";
    strength.style.color="orange";
  } else {
    strength.innerText="Strength: Strong";
    strength.style.color="green";
  }
}

/* 🔒 SECURITY LAYER (Encoded + Fake Logic) */

// Fake passwords (confusion)
const fake1 = "Hello123";
const fake2 = "Pankaj@2025";

// Real password (Base64 encoded)
const realEncoded = "SGVsbG8gUGFua2FqIGppaQ=="; // Hello Pankaj jii

function decode(str){
  return atob(str);
}

/* 🔓 Unlock */
function unlock(){
  const userPass = document.getElementById("password").value;

  // fake checks
  if(userPass === fake1 || userPass === fake2){
    passError.innerText="❌ Wrong Password";
    return;
  }

  if(userPass === decode(realEncoded)){
    passwordBox.style.display="none";
    folder.style.display="block";
  } else {
    passError.innerText="❌ Wrong Password";
    navigator.vibrate?.([200,100,200]);
  }
}

/* 🚫 Inspect discourage */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("keydown", e => {
  if(e.key === "F12" || 
     (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
     (e.ctrlKey && e.key === "U")){
    e.preventDefault();
  }
});
</script>
