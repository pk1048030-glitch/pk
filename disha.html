<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pankaj Kumar - Header with Search</title>
  <style>
    :root {
      --primary-color: #3f51b5;
      --secondary-color: #ff9800;
      --accent-color: #00c853;
      --bg-gradient: linear-gradient(135deg, #e3f2fd, #fff3e0);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", "Segoe UI", Arial, sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: #333;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 15px 5%;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      animation: slideDown 1s ease;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.8em;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
    }

    nav ul li {
      margin-left: 25px;
    }

    nav ul li a {
      text-decoration: none;
      color: white;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    nav ul li a:hover {
      color: #ffe97f;
      text-shadow: 0px 0px 6px #fff;
    }

    /* 🔍 Search Box */
    .search-box {
      margin-left: 20px;
      position: relative;
    }

    .search-box input {
      padding: 6px 30px 6px 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 0.95em;
      transition: 0.3s;
    }

    .search-box input:focus {
      box-shadow: 0 0 8px #fff;
    }

    .search-box::after {
      content: "🔍";
      position: absolute;
      right: 10px;
      top: 4px;
      font-size: 1.1em;
      pointer-events: none;
    }

    /* 📂 Folder Section */
    .folder-container {
      margin-top: 120px;
      text-align: center;
      animation: fadeIn 1.5s ease-in-out;
    }

    .folder {
      display: inline-block;
      background: rgba(255, 255, 255, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px 60px;
      font-size: 1.4em;
      font-weight: 600;
      color: #2e7d32;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 1px;
    }

    .folder span {
      display: inline-block;
      transition: transform 0.4s ease;
    }

    .folder:hover span {
      transform: translateX(6px);
    }

    .folder::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, rgba(255,255,255,0.6), transparent);
      transition: 0.6s;
    }

    .folder:hover::before {
      left: 100%;
    }

    .folder:hover {
      transform: scale(1.05) translateY(-5px);
      background: linear-gradient(145deg, #4caf50, #2e7d32);
      color: #fff;
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    /* Animations */
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media(max-width: 768px) {
      nav {
        flex-direction: column;
        text-align: center;
      }
      nav ul {
        margin-top: 10px;
        flex-direction: column;
      }
      nav ul li {
        margin: 10px 0;
      }
      .search-box {
        margin: 10px 0;
      }
      .folder {
        width: 80%;
        font-size: 1.1em;
      }
    }
  </style>
</head>
<body>

  <!-- हेडर -->
  <header>
    <nav>
      <div class="logo">🌟 Pankaj Kumar 🌟</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search here...">
      </div>
      <ul id="menuList">
        <li><a href="index.html">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">YouTube</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- 📘 Folder Button -->
  <div class="folder-container">
    <div class="folder" onclick="openFolder()">
      📘 <span>Disha 12th Science Notes</span>
    </div>
  </div>

  <script>
    // 🔍 Live Search Function
    const searchInput = document.getElementById('searchInput');
    const menuList = document.getElementById('menuList');
    const items = menuList.getElementsByTagName('li');

    searchInput.addEventListener('keyup', function() {
      const filter = searchInput.value.toLowerCase();
      for (let i = 0; i < items.length; i++) {
        let text = items[i].textContent.toLowerCase();
        items[i].style.display = text.includes(filter) ? "" : "none";
      }
    });

    // 📂 Folder Click Action
    function openFolder() {
      // 👉 यहां अपने नोट्स का लिंक डालो
      window.location.href = "https://drive.google.com/drive/folders/1LjX3rR12qAOppeGj_lngVmh3hY6_tecu";
    }
  </script>

</body>
</html>
