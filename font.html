<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Font Maker | Pankaj</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#4facfe;
  --secondary:#00f2fe;
  --bg:#0b0f1a;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.15);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at top,#1b2a4e,#0b0f1a 60%);
  color:#fff;
}

/* Glass Card */
.container{
  width:92%;
  max-width:420px;
  padding:24px;
  border-radius:20px;
  background:linear-gradient(135deg,
    rgba(255,255,255,0.12),
    rgba(255,255,255,0.03));
  backdrop-filter: blur(14px);
  border:1px solid var(--border);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.6),
    inset 0 0 0 1px rgba(255,255,255,0.05);
  animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(25px);}
  to{opacity:1;transform:translateY(0);}
}

h2{
  text-align:center;
  font-weight:700;
  font-size:22px;
  margin-bottom:20px;
  background:linear-gradient(to right,var(--primary),var(--secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

label{
  font-size:13px;
  font-weight:500;
  color:#b9c7ff;
  margin:10px 0 6px;
  display:block;
}

textarea{
  width:100%;
  min-height:90px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.35);
  color:#fff;
  padding:12px 14px;
  font-size:15px;
  outline:none;
  resize:none;
  transition:0.25s;
}

textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(79,172,254,0.25);
}

#outputText{
  font-size:18px;
  letter-spacing:1px;
}

/* Button */
.btn-copy{
  width:100%;
  margin-top:18px;
  padding:14px;
  border-radius:30px;
  border:none;
  font-size:15px;
  font-weight:600;
  color:#00243a;
  cursor:pointer;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  box-shadow:0 10px 25px rgba(0,242,254,0.35);
  transition:all 0.25s ease;
}

.btn-copy:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 35px rgba(0,242,254,0.5);
}

.btn-copy:active{
  transform:scale(0.96);
}

/* Footer */
.footer{
  text-align:center;
  margin-top:14px;
  font-size:12px;
  color:#7f8cff;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔵 Blue Font Maker</h2>

  <label>Enter Text</label>
  <textarea id="inputText" placeholder="Type here (e.g. Pankaj)"></textarea>

  <label>Result</label>
  <textarea id="outputText" readonly placeholder="Converted text will appear here"></textarea>

  <button class="btn-copy" onclick="copyText()">📋 Copy Blue Text</button>

  <div class="footer">Created by Alpha Art</div>
</div>

<script>
const inputField = document.getElementById('inputText');
const outputField = document.getElementById('outputText');

const convertToBlueFont = (text) => {
  let result='';
  const offset=127397;
  for(let char of text){
    let code=char.toUpperCase().charCodeAt(0);
    if(code>=65 && code<=90){
      result+=String.fromCodePoint(code+offset)+'\u200C';
    }else{
      result+=char;
    }
  }
  return result;
};

inputField.addEventListener('input',()=>{
  outputField.value=convertToBlueFont(inputField.value);
});

function copyText(){
  outputField.select();
  outputField.setSelectionRange(0,99999);
  navigator.clipboard.writeText(outputField.value).then(()=>{
    const btn=document.querySelector('.btn-copy');
    const old=btn.innerText;
    btn.innerText="✅ Copied!";
    setTimeout(()=>btn.innerText=old,1800);
  });
}
</script>

</body>
</html>
